<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Maruška by si přála… — admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/fraunces@5/400.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/fraunces@5/500.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/fraunces@5/400-italic.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <main class="wrap">
    <header>
      <h1>Admin</h1>
      <p class="subtitle">Maruška by si přála… — backoffice</p>
    </header>

    <section id="login-section">
      <form id="login-form" action="javascript:void(0)" autocomplete="on">
        <label>
          <span class="dialog-label">Email</span>
          <input type="email" id="email" name="email" required autocomplete="username">
        </label>
        <label>
          <span class="dialog-label">Heslo</span>
          <input type="password" id="password" name="password" required autocomplete="current-password">
        </label>
        <div>
          <button type="submit" class="btn-outline">Přihlásit</button>
        </div>
        <p id="login-error" class="error" hidden></p>
      </form>
      <p class="login-extra">
        <button type="button" id="forgot-link" class="btn-link">Zapomenuté heslo?</button>
      </p>
    </section>

    <section id="recovery-section" hidden>
      <h2 class="recovery-h2">Nové heslo</h2>
      <p class="muted">Nastav si nové heslo a budeš přihlášená.</p>
      <form id="recovery-form" autocomplete="off">
        <label>
          <span class="dialog-label">Nové heslo</span>
          <input type="password" id="new-password" required autocomplete="new-password" minlength="6">
        </label>
        <label>
          <span class="dialog-label">Ještě jednou pro kontrolu</span>
          <input type="password" id="new-password-confirm" required autocomplete="new-password" minlength="6">
        </label>
        <div>
          <button type="submit" class="btn-outline">Uložit nové heslo</button>
        </div>
      </form>
    </section>

    <section id="admin-section" hidden>
      <div class="admin-toolbar">
        <button type="button" id="new-btn" class="btn-outline btn-small">+ Nový dárek</button>
        <button type="button" id="logout-btn" class="btn-link">Odhlásit</button>
      </div>

      <div id="admin-table"></div>

      <div class="admin-footer">
        <label class="show-deleted-toggle">
          <input type="checkbox" id="show-deleted">
          <span>Zobrazit smazané</span>
        </label>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
