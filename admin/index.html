<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Maruška by si přála… — admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/fraunces@5/400.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/fraunces@5/500.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/fraunces@5/400-italic.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <main class="wrap">
    <header>
      <h1>Admin</h1>
      <p class="subtitle">Maruška by si přála… — backoffice</p>
    </header>

    <section id="login-section">
      <form id="login-form">
        <label>
          <span class="dialog-label">Email</span>
          <input type="email" id="email" required autocomplete="email">
        </label>
        <label>
          <span class="dialog-label">Heslo</span>
          <input type="password" id="password" required autocomplete="current-password">
        </label>
        <div>
          <button type="submit" class="btn-outline">Přihlásit</button>
        </div>
        <p id="login-error" class="error" hidden></p>
      </form>
    </section>

    <section id="admin-section" hidden>
      <div class="admin-toolbar">
        <button type="button" id="new-btn" class="btn-outline btn-small">+ Nový dárek</button>
        <button type="button" id="logout-btn" class="btn-link">Odhlásit</button>
      </div>

      <div id="admin-table"></div>
    </section>
  </main>

  <div id="toast" class="toast" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
