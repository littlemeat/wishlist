<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Maruška by si přála…</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/fraunces@5/400.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/fraunces@5/500.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/fraunces@5/400-italic.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="wrap">
    <header>
      <h1>Maruška by si přála…</h1>
      <p class="subtitle">Tak ti to ulehčuju</p>
    </header>

    <nav id="filters" class="filters" aria-label="Filtry"></nav>
    <p id="filter-hint" class="filter-hint" hidden>Jen dárky se všemi vybranými značkami.</p>
    <div class="surprise-row">
      <button type="button" id="surprise-btn" class="filter filter--surprise">Překvap mě</button>
    </div>

    <ul id="items" class="items"></ul>

    <p id="empty" class="empty" hidden>Gratuluju, vybral/a sis filtr, ke kterému nic nemám.</p>
  </main>

  <div id="toast" class="toast" hidden></div>

  <dialog id="image-modal" class="image-modal" aria-label="Náhled obrázku">
    <button type="button" id="image-modal-close" class="image-modal-close" aria-label="Zavřít">×</button>
    <img class="image-modal-img" alt="">
  </dialog>

  <dialog id="reserve-modal">
    <form id="reserve-form">
      <h2>Beru si to</h2>
      <label>
        <span class="dialog-label">Vyplň jméno (nepovinné)</span>
        <input type="text" id="reserver-name" autocomplete="name" maxlength="80">
      </label>
      <menu>
        <button type="button" id="reserve-cancel" class="btn-link">Zpátky</button>
        <button type="submit" class="btn-outline">Rezervovat</button>
      </menu>
    </form>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
