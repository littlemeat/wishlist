name: Keep Supabase warm

# Supabase free tier pausne projekt po ~7 dnech bez aktivity.
# Empiricky ověřeno (červen + červenec 2026): anonymní REST ČTENÍ se do
# aktivity NEPOČÍTÁ — projekt zaspal pár hodin po úspěšném GET pingu.
# Proto cron dělá ZÁPIS: volá keepalive_ping() (viz supabase/add-keepalive.sql),
# která updatne timestamp. GET zůstává jako fallback/reachability check.
#
# Druhá past: GitHub automaticky vypíná scheduled workflows po 60 dnech
# bez commitů v repu. Proto si workflow jednou za ~3 týdny udělá prázdný
# keepalive commit — drží tím naživu sám sebe.
#
# Klíč i URL jsou už veřejně v js/config.js (publishable key, by design safe),
# proto jsou tady inline a ne v secrets.

on:
  schedule:
    - cron: '0 7 * * *'  # každý den 07:00 UTC (~09:00 v Praze létě, ~08:00 v zimě)
  workflow_dispatch:  # ruční trigger z GitHub UI pro debug

permissions:
  contents: write  # kvůli keepalive commitu

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Write-ping Supabase (RPC keepalive_ping + GET fallback)
        env:
          SUPABASE_URL: https://vaxujjcvykatjivgkzjn.supabase.co
          SUPABASE_KEY: sb_publishable_J_rKqoDQPJSjhgao7OXM0A_OfsuxHCQ
        run: |
          rpc=$(curl -s -o /tmp/rpc -w "%{http_code}" -X POST \
            -H "apikey: $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "$SUPABASE_URL/rest/v1/rpc/keepalive_ping")
          echo "RPC keepalive_ping: HTTP $rpc — $(cat /tmp/rpc)"
          if [ "$rpc" = "404" ]; then
            echo "::warning::keepalive_ping() v DB neexistuje — spusť supabase/add-keepalive.sql v SQL editoru"
          fi

          get=$(curl -s -o /tmp/get -w "%{http_code}" \
            -H "apikey: $SUPABASE_KEY" \
            "$SUPABASE_URL/rest/v1/wishlist_items?select=id&limit=1")
          echo "REST read: HTTP $get — $(cat /tmp/get)"

          if [ "$rpc" != "200" ] && [ "$get" != "200" ]; then
            echo "::error::Supabase nedostupná (RPC $rpc, GET $get) — projekt nejspíš spí"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Keepalive commit when repo idles too long
        run: |
          last_commit=$(git log -1 --format=%ct)
          now=$(date +%s)
          days=$(( (now - last_commit) / 86400 ))
          echo "Days since last commit: $days"
          if [ "$days" -ge 21 ]; then
            git config user.name "keep-warm-bot"
            git config user.email "actions@users.noreply.github.com"
            git commit --allow-empty -m "chore: keepalive — GitHub vypíná neaktivní crony po 60 dnech"
            git push
            echo "Keepalive commit pushed."
          else
            echo "Repo is active enough, no commit needed."
          fi
